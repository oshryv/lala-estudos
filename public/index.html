<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Lala — Semana de Provas Year 4</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-l:#E1F5EE;--green-d:#085041;
  --blue:#378ADD;--blue-l:#E6F1FB;--blue-d:#0C447C;
  --pink:#D4537E;--pink-l:#FBEAF0;--pink-d:#72243E;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-d:#633806;
  --purple:#7F77DD;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --red:#E24B4A;--red-l:#FCEBEB;--red-d:#791F1F;
  --gray:#5F5E5A;--gray-l:#F1EFE8;--gray-d:#2C2C2A;
  --bg:#f5f4f0;--card:#fff;--text:#1a1a1a;--muted:#666;--border:#e0ddd8;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* TOPBAR */
.topbar{background:#fff;padding:.6rem 1rem;display:flex;align-items:center;gap:8px;border-bottom:1.5px solid var(--border);flex-wrap:wrap;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:900;color:var(--text);margin-right:6px;white-space:nowrap}
.tri-bar{background:#fff;padding:.45rem 1rem;display:flex;align-items:center;gap:8px;border-bottom:1.5px solid var(--border)}
.tri-bar .tri-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-right:2px}
.tri-btn{padding:5px 16px;border-radius:20px;font-size:13px;font-weight:800;cursor:pointer;border:2px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;color:var(--muted);transition:all .15s}
.tri-btn.active{color:#fff;border-color:transparent;background:#2C2C2A}
.tri-empty{background:var(--card);border:1.5px dashed var(--border);border-radius:16px;padding:2.5rem 1.5rem;text-align:center;color:var(--muted)}
.tri-empty .ico{font-size:38px;display:block;margin-bottom:10px}
.tri-empty h3{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px}
.tri-empty p{font-size:13px;line-height:1.6;max-width:340px;margin:0 auto 14px}
.tri-empty button{padding:9px 20px;border-radius:22px;border:none;background:#BA7517;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
.tab{padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;transition:all .18s;white-space:nowrap}
.tab.active{color:#fff!important;border-color:transparent!important}

/* SCREENS */
.screen{display:none;padding:1rem;max-width:920px;margin:0 auto}
.screen.active{display:block}

/* ===== PAINEL ===== */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-top:.5rem}
.subj-card{border-radius:18px;padding:1.1rem 1.25rem;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;color:#fff;border:none;text-align:left;font-family:'Nunito',sans-serif;width:100%}
.subj-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.13)}
.subj-card .emoji{font-size:28px;margin-bottom:7px;display:block}
.subj-card h3{font-size:14px;font-weight:800;margin-bottom:3px}
.subj-card p{font-size:11.5px;line-height:1.5;opacity:.88}
.subj-card .date{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:10px;margin-top:7px;background:rgba(255,255,255,.25)}
.subj-card .lang{position:absolute;top:10px;right:12px;font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:8px;background:rgba(255,255,255,.25)}
.subj-card .bg-ico{position:absolute;bottom:-8px;right:-6px;font-size:68px;opacity:.08;pointer-events:none;line-height:1}
.detail-back{background:#fff;border:2px solid var(--border);border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--text);margin-bottom:1.25rem;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.detail-back:hover{background:#f0efea}
.detail-title{font-size:20px;font-weight:800;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.lang-pill{font-size:11px;font-weight:800;padding:3px 10px;border-radius:8px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.topic-card{border-radius:14px;padding:1rem 1.1rem}
.topic-card h4{font-size:13px;font-weight:800;margin-bottom:7px}
.topic-card ul{font-size:12.5px;line-height:1.9;list-style:none}
.topic-card ul li::before{content:"→ ";font-weight:700}
.activity{margin-top:10px;border-radius:10px;padding:8px 10px;font-size:12px;line-height:1.6;background:rgba(255,255,255,.5)}
.activity strong{display:block;font-size:10px;font-weight:800;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;opacity:.6}

/* ===== MAPA MENTAL ===== */
.mind-wrap{overflow:auto;background:var(--card);border-radius:16px;border:1.5px solid var(--border);padding:.5rem}
.mind-wrap svg{min-width:640px;width:100%;display:block;margin:auto}

/* ===== QUIZ ===== */
.qf-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.qf-btn{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;color:var(--muted);transition:all .15s}
.qf-btn.active{color:#fff;border-color:transparent}
.prog-bar{height:5px;background:#e0ddd8;border-radius:3px;margin-bottom:1.25rem;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s;background:var(--green)}
.quiz-box{max-width:560px}
.q-meta{font-size:11px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.q-text{font-size:15px;font-weight:700;line-height:1.55;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:11px;border:2px solid var(--border);cursor:pointer;font-size:13px;line-height:1.4;color:var(--text);transition:all .15s;background:var(--card);font-family:'Nunito',sans-serif;text-align:left;width:100%}
.opt:hover{border-color:#bbb;background:#fafaf8}
.opt.correct{border-color:var(--green);background:var(--green-l);color:var(--green-d)}
.opt.wrong{border-color:var(--red);background:var(--red-l);color:var(--red-d)}
.opt-letter{font-weight:800;font-size:12px;min-width:18px;margin-top:1px}
.feedback{font-size:13px;font-weight:700;padding:8px 12px;border-radius:9px;display:none;margin-bottom:12px;line-height:1.5}
.feedback.ok{display:block;background:var(--green-l);color:var(--green-d)}
.feedback.bad{display:block;background:var(--red-l);color:var(--red-d)}
.next-btn{padding:9px 24px;border-radius:20px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Nunito',sans-serif;color:#fff;display:none}
.next-btn:hover{opacity:.88}
.score-card{border-radius:16px;padding:2rem;text-align:center;display:none}
.score-card.show{display:block}
.score-card h2{font-size:32px;font-weight:900;margin-bottom:8px}
.score-card p{font-size:14px;margin-bottom:16px}
.retry-btn{padding:10px 24px;border-radius:20px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Nunito',sans-serif;color:#fff;background:rgba(0,0,0,.22)}

/* ===== SIMULADOS ===== */
.sim-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.sim-btn{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;color:var(--muted);transition:all .15s}
.sim-btn.active{color:#fff;border-color:transparent}
.sim-panel{display:none}
.sim-panel.active{display:block}
.exam-header{border-radius:14px;padding:1rem 1.25rem;margin-bottom:1.25rem;color:#fff;position:relative}
.exam-header h2{font-size:17px;font-weight:800;margin-bottom:2px}
.exam-header p{font-size:12px;opacity:.85}
.exam-score{position:absolute;top:12px;right:14px;font-size:13px;font-weight:800;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:12px}
.q-block{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:1rem 1.25rem;margin-bottom:12px}
.q-num{font-size:10px;font-weight:800;letter-spacing:.06em;opacity:.5;margin-bottom:6px;text-transform:uppercase}
.q-stem{font-size:13.5px;font-weight:700;line-height:1.6;color:var(--text);margin-bottom:10px}
.q-ctx{background:#f5f4f0;border-left:3px solid var(--border);border-radius:0 8px 8px 0;padding:8px 12px;font-size:12.5px;line-height:1.7;color:var(--muted);margin-bottom:10px;font-style:italic}
.q-reading{background:#fbfaf7;border-radius:0 10px 10px 0;padding:16px 18px;margin-bottom:14px;color:var(--text);font-size:14.5px;line-height:1.75}
.q-reading-title{font-size:16px;font-weight:800;margin-bottom:10px}
.q-reading p{margin:0 0 10px 0}
.q-reading p:last-child{margin-bottom:0}
.mc-opts{display:flex;flex-direction:column;gap:6px}
.mc-opt{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:10px;border:2px solid var(--border);cursor:pointer;font-size:13px;line-height:1.4;color:var(--text);transition:all .15s;background:var(--card);font-family:'Nunito',sans-serif;text-align:left;width:100%}
.mc-opt:hover{border-color:#bbb;background:#fafaf8}
.mc-opt.correct{border-color:var(--green);background:var(--green-l);color:var(--green-d)}
.mc-opt.wrong{border-color:var(--red);background:var(--red-l);color:var(--red-d)}
.mc-opt.selected{border-color:#7F77DD;background:#EEEDFE;color:#3C3489}
.mc-letter{font-weight:800;font-size:12px;min-width:18px;margin-top:1px;pointer-events:none}
.q-fb{margin-top:8px;font-size:12px;font-weight:700;padding:7px 10px;border-radius:8px;display:none;line-height:1.5}
.q-fb.show{display:block}
.q-fb.ok{background:var(--green-l);color:var(--green-d)}
.q-fb.bad{background:var(--red-l);color:var(--red-d)}
.check-btn{margin-top:1rem;padding:10px 26px;border-radius:22px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Nunito',sans-serif;color:#fff;transition:opacity .15s}
.check-btn:hover{opacity:.88}
.result-box{border-radius:14px;padding:1.5rem;text-align:center;margin-top:1rem;display:none}
.result-box.show{display:block}
.result-box h3{font-size:26px;font-weight:900;margin-bottom:6px}
.result-box p{font-size:13px;margin-bottom:12px}
.retry-s{padding:9px 22px;border-radius:20px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Nunito',sans-serif;color:#fff;background:rgba(0,0,0,.2)}

/* ===== RESUMOS ===== */
.res-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.res-btn{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;color:var(--muted);transition:all .15s}
.res-btn.active{color:#fff;border-color:transparent}
.res-panel{display:none}
.res-panel.active{display:block}
.res-header{border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;color:#fff;position:relative}
.res-header h2{font-size:17px;font-weight:800;margin-bottom:2px}
.res-header p{font-size:12px;opacity:.85}
.res-summary{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:1rem 1.25rem;margin-bottom:12px}
.res-summary h4{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;opacity:.6}
.res-summary p{font-size:13.5px;line-height:1.75;color:var(--text)}
.res-tips{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:1rem 1.25rem}
.res-tips h4{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;opacity:.6}
.res-tip{padding:10px 12px;border-radius:10px;margin-bottom:7px;font-size:13px;line-height:1.55;font-weight:600}
.res-tip:last-child{margin-bottom:0}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">📚 Lala — Year 4</span>
  <button class="tab active" id="t-dash" onclick="showTab('dash','#2C2C2A')">🏠 Painel</button>
  <button class="tab" id="t-mind" onclick="showTab('mind','#7F77DD')">🌿 Mapa Mental</button>
  <button class="tab" id="t-res" onclick="showTab('res','#1D9E75')">📝 Resumos</button>
  <button class="tab" id="t-quiz" onclick="showTab('quiz','#D4537E')">🎯 Quiz</button>
  <button class="tab" id="t-sim" onclick="showTab('sim','#BA7517')">📋 Simulados</button>
</div>

<div class="tri-bar">
  <span class="tri-label">Trimestre</span>
  <button class="tri-btn" id="tri-1" onclick="setTri(1)">1º Tri</button>
  <button class="tri-btn active" id="tri-2" onclick="setTri(2)">2º Tri</button>
</div>

<!-- ===== PAINEL ===== -->
<div class="screen active" id="dash">
  <div id="dash-main">
    <div id="dash-1tri" class="dash-grid">
      <button class="subj-card" style="background:linear-gradient(135deg,#1D9E75,#0F6E56)" onclick="showDetail('science')"><span class="lang">EN</span><span class="emoji">🌿</span><h3>Science</h3><p>Food web, photosynthesis, producers &amp; consumers</p><span class="date">Exam: Mon 13/04</span><div class="bg-ico">🌿</div></button>
      <button class="subj-card" style="background:linear-gradient(135deg,#D4537E,#993556)" onclick="showDetail('portugues')"><span class="lang">PT</span><span class="emoji">✏️</span><h3>Língua Portuguesa</h3><p>Relato pessoal, sílabas, pronomes</p><span class="date">Prova: ter 14/04</span><div class="bg-ico">✏️</div></button>
      <button class="subj-card" style="background:linear-gradient(135deg,#378ADD,#185FA5)" onclick="showDetail('ciencias')"><span class="lang">PT</span><span class="emoji">🗺️</span><h3>Ciências</h3><p>Biomas: Amazônia, Mata Atlântica, Cerrado, Caatinga</p><span class="date">Prova: qui 16/04</span><div class="bg-ico">🗺️</div></button>
      <button class="subj-card" style="background:linear-gradient(135deg,#BA7517,#854F0B)" onclick="showDetail('matpt')"><span class="lang">PT</span><span class="emoji">🔢</span><h3>Matemática</h3><p>Números, operações, gráficos e situações-problema</p><span class="date">Prova: seg 22/04</span><div class="bg-ico">🔢</div></button>
      <button class="subj-card" style="background:linear-gradient(135deg,#633806,#412402)" onclick="showDetail('mat')"><span class="lang">EN</span><span class="emoji">🔢</span><h3>Math</h3><p>Place value, time, quadrilaterals, word problems</p><span class="date">Exam: Mon 22/04</span><div class="bg-ico">🔢</div></button>
      <button class="subj-card" style="background:linear-gradient(135deg,#E24B4A,#A32D2D)" onclick="showDetail('la')"><span class="lang">EN</span><span class="emoji">📖</span><h3>Language Arts</h3><p>Adjectives, verb tenses, types of sentences</p><span class="date">Exam: Mon 27/04</span><div class="bg-ico">📖</div></button>
      <button class="subj-card" style="background:linear-gradient(135deg,#7F77DD,#534AB7)" onclick="showDetail('geohist')"><span class="lang">PT</span><span class="emoji">🏛️</span><h3>Geo &amp; História</h3><p>Tipos de mapas, influências indígenas</p><span class="date">Prova: seg 28/04</span><div class="bg-ico">🏛️</div></button>
      <button class="subj-card" style="background:linear-gradient(135deg,#5F5E5A,#2C2C2A)" onclick="showDetail('social')"><span class="lang">EN</span><span class="emoji">🌎</span><h3>Social Studies</h3><p>Nomadic people, Mayas, Aztecs, Incas</p><span class="date">Exam: Wed 29/04</span><div class="bg-ico">🌎</div></button>
    </div>
    <div id="dash-2tri" class="dash-grid" style="display:none">
      <button class="subj-card" style="background:linear-gradient(135deg,#E24B4A,#A32D2D)" onclick="goSim('la')"><span class="lang">EN</span><span class="emoji">📖</span><h3>Language Arts</h3><p>Informative text, FANBOYS, synonyms/antonyms, common/proper nouns, present/past tense</p><span class="date">Exam: Mon 22/06</span><div class="bg-ico">📖</div></button>
      <button class="subj-card" style="background:linear-gradient(135deg,#378ADD,#185FA5)" onclick="goSim('ciencias2')"><span class="lang">PT</span><span class="emoji">💧</span><h3>Ciências</h3><p>Estados físicos da água, ciclo da água</p><span class="date">Prova: ter 23/06</span><div class="bg-ico">💧</div></button>
      <button class="subj-card" style="background:linear-gradient(135deg,#633806,#412402)" onclick="goSim('math2')"><span class="lang">EN</span><span class="emoji">🔢</span><h3>Math</h3><p>Word problems, lines of symmetry, types of triangles, bar graph</p><span class="date">Exam: Wed 24/06</span><div class="bg-ico">🔢</div></button>
    </div>
  </div>
  <div id="dash-detail" style="display:none"></div>
</div>

<!-- ===== MAPA MENTAL ===== -->
<div class="screen" id="mind">
  <style>
    .mind-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
    .mind-btn{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;color:var(--muted);transition:all .15s}
    .mind-btn.active{color:#fff;border-color:transparent}
    .mind-map{display:none;overflow:auto;background:var(--card);border-radius:16px;border:1.5px solid var(--border);padding:1rem}

    .mind-hint{font-size:11px;color:var(--muted);text-align:center;margin-bottom:.5rem}

  <p class="mind-hint">💡 Role para os lados se o mapa for grande</p>

  <!-- SCIENCE -->

  });
  document.getElementById('sim-questions').innerHTML='';
  document.getElementById('res-content').innerHTML='';

  var active = document.querySelector('.screen.active');

    var id=active.id;
    if(id==='sim') buildSimNav();

var cQ=[],qi=0,sc=0,ans=false,af='all';
var CATS=[['all','Todas / All','#2C2C2A'],['science','🌿 Science','#1D9E75'],['ciencias','🗺️ Ciências','#378ADD'],['portugues','✏️ Português','#D4537E'],['mat','🔢 Math','#BA7517'],['la','📖 Lang Arts','#E24B4A'],['social','🌎 Social','#5F5E5A'],['geohist','🏛️ Geo & Hist','#7F77DD']];
function buildQF(){
  var w=document.getElementById('qf');
  var prog=document.querySelector('#quiz .prog-bar');
  if(currentTri===2){
    if(w){w.style.display='none';w.innerHTML='';}
    if(prog)prog.style.display='none';
    document.getElementById('qbox').innerHTML=triEmptyHTML('🎯','Quiz do 2º trimestre em breve','O quiz rápido do 2º trimestre entra com o conteúdo de Ciências e Math. Por enquanto, treina nas provas pelos Simulados.');
    return;
  }
  if(w)w.style.display='';
  if(prog)prog.style.display='';
  if(w.childElementCount)return;
  CATS.forEach((c,i)=>{
    var b=document.createElement('button');b.className='qf-btn'+(i===0?' active':'');
    b.textContent=c[1];if(i===0){b.style.background=c[2];b.style.color='#fff';b.style.borderColor=c[2];}
    b.onclick=()=>startQuiz(c[0],b);w.appendChild(b);
  });
}
function startQuiz(filter,btn){
  af=filter;
  document.querySelectorAll('.qf-btn').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='var(--muted)';b.style.borderColor='var(--border)';});
  if(btn){btn.classList.add('active');var cc=CATS.find(c=>c[0]===filter);btn.style.background=cc[2];btn.style.color='#fff';btn.style.borderColor=cc[2];}
  cQ=filter==='all'?shuf(QUIZ.slice()):shuf(QUIZ.filter(q=>q.cat===filter));
  qi=0;sc=0;ans=false;renderQ();
}
function shuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function renderQ(){
  document.getElementById('prog').style.width=Math.round(qi/cQ.length*100)+'%';
  var box=document.getElementById('qbox');
  if(qi>=cQ.length){
    var pct=Math.round(sc/cQ.length*100);
    var bg=pct>=80?'var(--green-l)':'var(--amber-l)';var col=pct>=80?'var(--green-d)':'var(--amber-d)';
    var emoji=pct>=80?'🌟':pct>=60?'👍':'💪';
    box.innerHTML='<div class="score-card show" style="background:'+bg+';color:'+col+'"><h2>'+emoji+' '+sc+'/'+cQ.length+'</h2><p>'+pct+'%'+(pct>=80?' — Excellent! Ready for the exam!':pct>=60?' — Good! Review the red answers.':' — Keep practicing!')+'</p><button class="retry-btn" onclick="startQuiz(af,null)">🔄 Play again</button></div>';
    document.getElementById('prog').style.width='100%';return;
  }
  var q=cQ[qi];
  var ce={science:'🌿',ciencias:'🗺️',portugues:'✏️',mat:'🔢',la:'📖',geohist:'🏛️',social:'🌎'};
  var lb=q.lang==='en'?'background:#E6F1FB;color:#0C447C':'background:#FBEAF0;color:#72243E';
  var L=['A','B','C','D'];
  var h='<div class="q-meta">'+ce[q.cat]+' Q'+(qi+1)+'/'+cQ.length+'<span class="lang-pill" style="'+lb+'">'+q.lang.toUpperCase()+'</span></div>';
  h+='<div class="q-text">'+q.q+'</div><div class="opts">';
  q.opts.forEach((o,i)=>{h+='<button class="opt" onclick="doAns('+i+')"><span class="opt-letter">'+L[i]+'</span>'+o+'</button>';});
  h+='</div><div class="feedback" id="fb"></div><button class="next-btn" id="nxt" style="background:'+NC[q.cat]+'" onclick="nextQ()">Next →</button>';
  box.innerHTML=h;ans=false;
}
function doAns(i){
  if(ans)return;ans=true;
  var q=cQ[qi];var opts=document.querySelectorAll('.opt');
  opts[q.a].classList.add('correct');
  var fb=document.getElementById('fb');
  if(i===q.a){sc++;fb.textContent='✅ Correct! '+q.exp;fb.className='feedback ok';}
  else{opts[i].classList.add('wrong');fb.textContent='❌ Answer: '+['A','B','C','D'][q.a]+'. '+q.exp;fb.className='feedback bad';}
  document.getElementById('nxt').style.display='inline-block';
}
function nextQ(){qi++;renderQ();}

function startSimTopic(label){
  currentTopicLabel = label;
  var sub = SIMS.find(function(s){return s.key===currentSimKey;});
  var subtopic = sub.subtopics.find(function(t){ return t.label===label; });
  if(!subtopic || !subtopic.questions) return;
  simAnswers={};
  simQuestions = subtopic.questions;
  renderSimQuestions(sub, subtopic);
}

function renderSimQuestions(sub, subtopic){
  var color = sub.color;
  var lang = sub.lang;
  var questions = subtopic.questions;
  var tLabel = currentTopicLabel;

  var wrap = document.getElementById('sim-questions');
  wrap.innerHTML = '';

  // Botão voltar
  var backDiv = document.createElement('div');
  backDiv.style.marginBottom = '10px';
  var bb = document.createElement('button');
  bb.style.cssText = 'border:1.5px solid #e0ddd8;background:#fff;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif;color:#1a1a1a';
  bb.textContent = lang==='pt' ? '← Escolher outro simulado' : '← Choose another exam';
  bb.onclick = function(){ loadSim(currentSimKey); };
  backDiv.appendChild(bb);
  wrap.appendChild(backDiv);

  // Header
  var html = '';
  html += '<div class="exam-header" style="background:linear-gradient(135deg,'+color+','+darken(color)+')">';
  html += '<h2>'+sub.label+' — '+tLabel+'</h2>';
  html += '<p style="font-size:12px;opacity:.85">'+(lang==='pt'?'Selecione suas respostas e corrija no final':'Select your answers and check at the end')+'</p>';
  html += '<span class="exam-score" id="sc-dynamic">— / '+questions.length+'</span></div>';

  // Texto de contexto (reading comprehension)
  if(subtopic.ctxParas || subtopic.context){
    var ttl='', paras='';
    if(subtopic.ctxParas){
      ttl = subtopic.ctxTitle || '';
      paras = subtopic.ctxParas.map(function(p){return '<p>'+escHtml(p)+'</p>';}).join('');
    } else {
      var ctx = subtopic.context, nl = ctx.indexOf('\n\n');
      ttl = nl>0 ? ctx.slice(0,nl).trim() : '';
      var body = nl>0 ? ctx.slice(nl+2) : ctx;
      paras = body.split(/\n\n+/).map(function(p){return '<p>'+escHtml(p.trim()).replace(/\n/g,' ')+'</p>';}).join('');
    }
    html += '<div class="q-reading" style="border-left:4px solid '+color+'">'
      + (ttl?'<div class="q-reading-title" style="color:'+color+'">'+escHtml(ttl)+'</div>':'')
      + paras + '</div>';
  }

  var letters = ['A','B','C','D'];
  questions.forEach(function(q,i){
    html += '<div class="q-block" id="qblock-'+i+'">';
    html += '<div class="q-num">'+(lang==='pt'?'Questão':'Question')+' '+(i+1)+'</div>';
    html += '<div class="q-stem">'+escHtml(q.q)+'</div>';
    html += '<div class="mc-opts">';
    q.opts.forEach(function(opt,j){
      html += '<button class="mc-opt" onclick="pickSimMC(this,'+i+','+j+')"><span class="mc-letter">'+letters[j]+'</span>'+escHtml(opt)+'</button>';
    });
    html += '</div><div class="q-fb" id="qfb-'+i+'"></div>';
    html += '</div>';
  });

  var btnLabel = lang==='pt'?'Corrigir ✓':'Check my answers ✓';
  html += '<button class="check-btn" style="background:'+color+'" onclick="checkDynamicSim()">'+btnLabel+'</button>';
  html += '<div class="result-box" id="rb-dynamic"><h3 id="rb-dynamic-h"></h3><p id="rb-dynamic-p"></p>';
  html += '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">';
  html += '<button class="retry-s" onclick="retrySimTopic()" style="background:'+color+'">'+(lang==='pt'?'Refazer 🔄':'Retry 🔄')+'</button>';
  html += '<button class="retry-s" onclick="loadSim(currentSimKey)" style="background:rgba(0,0,0,.15)">'+(lang==='pt'?'Outro simulado ←':'Another exam ←')+'</button>';
  html += '</div></div>';

  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  while(tmp.firstChild) wrap.appendChild(tmp.firstChild);
}

function pickSimMC(el,qIdx,optIdx){
  var btn = el.closest('.mc-opt')||el;
  var opts = btn.parentElement.querySelectorAll('.mc-opt');
  opts.forEach(function(o){o.classList.remove('selected');});
  btn.classList.add('selected');
  simAnswers[qIdx]=optIdx;
}

function checkDynamicSim(){
  var score=0;
  var total=simQuestions.length;
  var sub=SIMS.find(function(s){return s.key===currentSimKey;});
  var lang=sub?sub.lang:'en';

  simQuestions.forEach(function(q,i){
    var fb=document.getElementById('qfb-'+i);
    var opts=document.querySelectorAll('#qblock-'+i+' .mc-opt');
    var chosen=simAnswers[i];
    var correct=q.a;

    if(chosen===undefined){
      if(fb){fb.className='q-fb show bad';fb.textContent='❌ '+(lang==='pt'?'Selecione uma opção!':'Select an option!');}
      if(opts[correct]) opts[correct].classList.add('correct');
      return;
    }

    opts.forEach(function(o){o.classList.remove('selected');});
    if(chosen===correct){
      score++;
      opts[correct].classList.add('correct');
      if(fb){fb.className='q-fb show ok';fb.textContent='✅ '+q.exp;}
    } else {
      opts[chosen].classList.add('wrong');
      opts[correct].classList.add('correct');
      if(fb){fb.className='q-fb show bad';fb.textContent='❌ '+q.exp;}
    }
  });

  var pct=Math.round(score/total*100);
  var rb=document.getElementById('rb-dynamic');
  var rh=document.getElementById('rb-dynamic-h');
  var rp=document.getElementById('rb-dynamic-p');
  var emoji=pct>=80?'🌟':pct>=60?'👍':'💪';
  var msg=pct>=80?(lang==='pt'?'Excelente! Pronta para a prova!':'Excellent! Ready for the exam!')
                 :pct>=60?(lang==='pt'?'Bom trabalho! Revise as vermelhas.':'Good job! Review the red answers.')
                 :(lang==='pt'?'Continue praticando!':'Keep practicing!');
  rh.textContent=emoji+' '+score+'/'+total+' ('+pct+'%)';
  rp.textContent=msg;
  rb.style.background=pct>=80?'var(--green-l)':'var(--amber-l)';
  rb.style.color=pct>=80?'var(--green-d)':'var(--amber-d)';
  rb.className='result-box show';
  document.getElementById('sc-dynamic').textContent=score+'/'+total;
  // scroll pro resultado
  rb.scrollIntoView({behavior:'smooth',block:'center'});
}

function retrySimTopic(){
  startSimTopic(currentTopicLabel);
}

function darken(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[Math.max(0,r-40),Math.max(0,g-40),Math.max(0,b-40)].map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// init
showTab('dash','#2C2C2A');
setTri(2);
</script>
